<html lang="en">
<head>

    <style>
        #container{
            border: 1px solid black;
            width: 90%;
            margin: auto;
            height: 500px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background-color: darkcyan;

        }
        #container > div{
            /* border: 1px solid red; */

            width: 30%;

            justify-content: center;
            background-color: beige;
            border-radius: 5%;

        }
    </style>
</head>
<body>
    <div id="container">
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am Div 1</div>
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am Div 2</div>
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am Div 3</div>
    </div>
